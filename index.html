<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Running Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #111111;
        --surface2: #1a1a1a;
        --border: #2a2a2a;
        --accent: #c8ff00;
        --accent2: #ff6b35;
        --text: #f0f0f0;
        --muted: #666;
        --danger: #ff4444;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      header {
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
        position: sticky;
        top: 0;
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(12px);
        z-index: 100;
      }
      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.6rem;
        letter-spacing: 0.08em;
        color: var(--accent);
      }
      .logo span {
        color: var(--text);
      }
      .api-config {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .api-config label {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .api-config input {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        padding: 0.4rem 0.75rem;
        border-radius: 4px;
        width: 260px;
        outline: none;
        transition: border-color 0.2s;
      }
      .api-config input:focus {
        border-color: var(--accent);
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.3s;
        flex-shrink: 0;
      }
      .status-dot.online {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }
      .status-dot.offline {
        background: var(--danger);
      }

      .layout {
        display: grid;
        grid-template-columns: 200px 1fr;
        min-height: calc(100vh - 64px);
      }
      nav {
        border-right: 1px solid var(--border);
        padding: 1.5rem 0;
        position: sticky;
        top: 64px;
        height: calc(100vh - 64px);
        overflow-y: auto;
      }
      .nav-section {
        padding: 0 1rem 1.5rem;
      }
      .nav-label {
        font-family: "DM Mono", monospace;
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--muted);
        padding: 0 0.5rem 0.5rem;
      }
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        width: 100%;
        background: none;
        border: none;
        color: #888;
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        font-weight: 400;
        padding: 0.55rem 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        text-align: left;
        transition: all 0.15s;
      }
      .nav-btn:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .nav-btn.active {
        background: var(--surface2);
        color: var(--accent);
        font-weight: 500;
      }

      main {
        padding: 2rem;
        overflow-y: auto;
      }
      .page-header {
        margin-bottom: 1.5rem;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .page-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.8rem;
        letter-spacing: 0.05em;
        line-height: 1;
      }
      .page-title span {
        color: var(--accent);
      }
      .page-meta {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .btn-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .btn {
        background: var(--accent);
        color: #000;
        border: none;
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.5rem 1.1rem;
        border-radius: 6px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
        letter-spacing: 0.03em;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-outline {
        background: none;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: none;
      }
      .btn-sm {
        font-size: 0.7rem;
        padding: 0.3rem 0.65rem;
        border-radius: 4px;
      }

      .filters {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .filter-input {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        padding: 0.5rem 0.9rem;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.2s;
      }
      .filter-input:focus {
        border-color: var(--accent);
      }
      .filter-input::placeholder {
        color: var(--muted);
      }

      .table-wrap {
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.83rem;
      }
      thead {
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      thead th {
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        padding: 0.75rem 1rem;
        text-align: left;
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: var(--surface2);
      }
      tbody td {
        padding: 0.75rem 1rem;
        color: var(--text);
        font-weight: 300;
      }
      .td-id {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
      }
      .td-actions {
        display: flex;
        gap: 0.4rem;
      }

      .badge {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .badge-green {
        background: rgba(200, 255, 0, 0.12);
        color: var(--accent);
      }
      .badge-orange {
        background: rgba(255, 107, 53, 0.12);
        color: var(--accent2);
      }
      .badge-gray {
        background: rgba(255, 255, 255, 0.06);
        color: #aaa;
      }
      .badge-red {
        background: rgba(255, 68, 68, 0.12);
        color: var(--danger);
      }

      .stats-strip {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem;
      }
      .stat-label {
        font-family: "DM Mono", monospace;
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 0.3rem;
      }
      .stat-value {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        letter-spacing: 0.04em;
        color: var(--accent);
        line-height: 1;
      }

      .empty {
        padding: 3rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        font-family: "DM Mono", monospace;
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.5rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-msg {
        padding: 1rem 1.25rem;
        background: rgba(255, 68, 68, 0.08);
        border: 1px solid rgba(255, 68, 68, 0.25);
        border-radius: 8px;
        color: #ff8888;
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        margin-bottom: 1rem;
      }
      .success-msg {
        padding: 1rem 1.25rem;
        background: rgba(200, 255, 0, 0.08);
        border: 1px solid rgba(200, 255, 0, 0.25);
        border-radius: 8px;
        color: var(--accent);
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        margin-bottom: 1rem;
      }

      .sub-tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
      }
      .sub-tab {
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        padding: 0.5rem 1rem 0.75rem;
        cursor: pointer;
        transition: all 0.15s;
        margin-bottom: -1px;
      }
      .sub-tab:hover {
        color: var(--text);
      }
      .sub-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .page {
        display: none;
      }
      .page.active {
        display: block;
      }

      /* MODAL */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        width: 560px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
        animation: fadeIn 0.2s ease;
      }
      .modal-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.4rem;
        letter-spacing: 0.05em;
        color: var(--accent);
      }
      .modal-body {
        padding: 1.5rem;
      }
      .modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }
      .close-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 1.2rem;
        cursor: pointer;
        transition: color 0.15s;
      }
      .close-btn:hover {
        color: var(--text);
      }

      /* FORM */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .form-field.full {
        grid-column: 1/-1;
      }
      .form-field label {
        font-family: "DM Mono", monospace;
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }
      .form-field input,
      .form-field select,
      .form-field textarea {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        padding: 0.55rem 0.8rem;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-field input:focus,
      .form-field select:focus,
      .form-field textarea:focus {
        border-color: var(--accent);
      }
      .form-field input::placeholder,
      .form-field textarea::placeholder {
        color: var(--muted);
      }
      .form-field select option {
        background: var(--surface2);
      }
      .form-field textarea {
        resize: vertical;
        min-height: 70px;
      }
      .form-msg {
        padding: 0.6rem 0.9rem;
        border-radius: 6px;
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        margin-bottom: 1rem;
      }
      .form-msg.err {
        background: rgba(255, 68, 68, 0.1);
        color: #ff8888;
        border: 1px solid rgba(255, 68, 68, 0.3);
      }
      .form-msg.ok {
        background: rgba(200, 255, 0, 0.1);
        color: var(--accent);
        border: 1px solid rgba(200, 255, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">RUN<span>TRACK</span></div>
      <div class="api-config">
        <label>API URL</label>
        <input type="text" id="apiUrl" value="http://localhost:5000" />
        <div class="status-dot" id="statusDot"></div>
      </div>
    </header>

    <div class="layout">
      <nav>
        <div class="nav-section">
          <div class="nav-label">Tables</div>
          <button class="nav-btn active" onclick="showPage('runners')">
            <span>🏃</span> Runners
          </button>
          <button class="nav-btn" onclick="showPage('runs')">
            <span>📍</span> Runs
          </button>
          <button class="nav-btn" onclick="showPage('routes')">
            <span>🗺️</span> Routes
          </button>
          <button class="nav-btn" onclick="showPage('shoes')">
            <span>👟</span> Shoes
          </button>
          <button class="nav-btn" onclick="showPage('goals')">
            <span>🎯</span> Goals
          </button>
        </div>
      </nav>
      <main>
        <!-- RUNNERS PAGE -->
        <div class="page active" id="page-runners">
          <div class="page-header">
            <div>
              <div class="page-title">ALL <span>RUNNERS</span></div>
              <div class="page-meta" id="runners-meta">—</div>
            </div>
            <div class="btn-row">
              <button class="btn" onclick="openModal('runner', null)">
                + Add Runner
              </button>
              <button class="btn btn-outline" onclick="loadRunners()">
                ↺ Refresh
              </button>
            </div>
          </div>
          <div id="runners-stats" class="stats-strip"></div>
          <div id="runners-msg"></div>
          <div id="runners-table"></div>
        </div>

        <!-- RUNS PAGE -->
        <div class="page" id="page-runs">
          <div class="page-header">
            <div>
              <div class="page-title">ALL <span>RUNS</span></div>
              <div class="page-meta" id="runs-meta">—</div>
            </div>
            <div class="btn-row">
              <button class="btn" onclick="openModal('run', null)">
                + Log Run
              </button>
              <button class="btn btn-outline" onclick="loadRuns()">
                ↺ Refresh
              </button>
            </div>
          </div>
          <div class="sub-tabs">
            <button
              class="sub-tab active"
              onclick="switchTab('runs', 'all', this)"
            >
              All Runs
            </button>
            <button
              class="sub-tab"
              onclick="switchTab('runs', 'byRunner', this)"
            >
              By Runner
            </button>
          </div>
          <div id="runs-filter" style="display: none" class="filters">
            <input
              class="filter-input"
              type="number"
              id="runs-runner-id"
              placeholder="Runner ID"
            />
            <button class="btn" onclick="loadRunsByRunner()">Search</button>
            <button
              class="btn btn-outline"
              onclick="
                loadRuns();
                switchTab(
                  'runs',
                  'all',
                  document.querySelector('#page-runs .sub-tab'),
                );
              "
            >
              Clear
            </button>
          </div>
          <div id="runs-stats" class="stats-strip"></div>
          <div id="runs-msg"></div>
          <div id="runs-table"></div>
        </div>

        <!-- ROUTES PAGE -->
        <div class="page" id="page-routes">
          <div class="page-header">
            <div>
              <div class="page-title">ALL <span>ROUTES</span></div>
              <div class="page-meta" id="routes-meta">—</div>
            </div>
            <div class="btn-row">
              <button class="btn" onclick="openModal('route', null)">
                + Add Route
              </button>
              <button class="btn btn-outline" onclick="loadRoutes()">
                ↺ Refresh
              </button>
            </div>
          </div>
          <div id="routes-msg"></div>
          <div id="routes-table"></div>
        </div>

        <!-- SHOES PAGE -->
        <div class="page" id="page-shoes">
          <div class="page-header">
            <div>
              <div class="page-title">ALL <span>SHOES</span></div>
              <div class="page-meta" id="shoes-meta">—</div>
            </div>
            <div class="btn-row">
              <button class="btn" onclick="openModal('shoe', null)">
                + Add Shoe
              </button>
              <button class="btn btn-outline" onclick="loadShoes()">
                ↺ Refresh
              </button>
            </div>
          </div>
          <div id="shoes-msg"></div>
          <div id="shoes-table"></div>
        </div>

        <!-- GOALS PAGE -->
        <div class="page" id="page-goals">
          <div class="page-header">
            <div>
              <div class="page-title">TRAINING <span>GOALS</span></div>
              <div class="page-meta" id="goals-meta">—</div>
            </div>
            <div class="btn-row">
              <button class="btn" onclick="openModal('goal', null)">
                + Add Goal
              </button>
              <button class="btn btn-outline" onclick="loadGoals()">
                ↺ Refresh
              </button>
            </div>
          </div>
          <div class="sub-tabs">
            <button
              class="sub-tab active"
              onclick="switchTab('goals', 'all', this)"
            >
              All Goals
            </button>
            <button
              class="sub-tab"
              onclick="switchTab('goals', 'byRunner', this)"
            >
              By Runner
            </button>
          </div>
          <div id="goals-filter" style="display: none" class="filters">
            <input
              class="filter-input"
              type="number"
              id="goals-runner-id"
              placeholder="Runner ID"
            />
            <button class="btn" onclick="loadGoalsByRunner()">Search</button>
            <button
              class="btn btn-outline"
              onclick="
                loadGoals();
                switchTab(
                  'goals',
                  'all',
                  document.querySelector('#page-goals .sub-tab'),
                );
              "
            >
              Clear
            </button>
          </div>
          <div id="goals-stats" class="stats-strip"></div>
          <div id="goals-msg"></div>
          <div id="goals-table"></div>
        </div>
      </main>
    </div>

    <!-- ═══════════════ RUNNER MODAL ═══════════════ -->
    <div class="modal-overlay" id="modal-runner">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="runner-modal-title">ADD RUNNER</span>
          <button class="close-btn" onclick="closeModal('runner')">✕</button>
        </div>
        <div class="modal-body">
          <div id="runner-form-msg"></div>
          <input type="hidden" id="runner-edit-id" />
          <div class="form-grid">
            <div class="form-field">
              <label>First Name *</label
              ><input id="rf-first" placeholder="First name" />
            </div>
            <div class="form-field">
              <label>Last Name *</label
              ><input id="rf-last" placeholder="Last name" />
            </div>
            <div class="form-field full">
              <label>Email *</label
              ><input
                id="rf-email"
                type="email"
                placeholder="email@example.com"
              />
            </div>
            <div class="form-field">
              <label>Date of Birth</label><input id="rf-dob" type="date" />
            </div>
            <div class="form-field">
              <label>Gender</label>
              <select id="rf-gender">
                <option value="">Select...</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-field">
              <label>Weight (lbs)</label
              ><input
                id="rf-weight"
                type="number"
                step="0.1"
                placeholder="165.0"
              />
            </div>
            <div class="form-field">
              <label>Height (inches)</label
              ><input id="rf-height" type="number" placeholder="70" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('runner')">
            Cancel
          </button>
          <button class="btn" onclick="submitRunner()">Save Runner</button>
        </div>
      </div>
    </div>

    <!-- ═══════════════ RUN MODAL ═══════════════ -->
    <div class="modal-overlay" id="modal-run">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="run-modal-title">LOG RUN</span>
          <button class="close-btn" onclick="closeModal('run')">✕</button>
        </div>
        <div class="modal-body">
          <div id="run-form-msg"></div>
          <input type="hidden" id="run-edit-id" />
          <div class="form-grid">
            <div class="form-field">
              <label>Runner ID *</label

    <script>
      // ── CORE ──────────────────────────────────────────────────
      const B = () =>
        document.getElementById("apiUrl").value.replace(/\/$/, "");

      async function checkHealth() {
        const d = document.getElementById("statusDot");
        try {
          const r = await fetch(B() + "/health");
          d.className = r.ok ? "status-dot online" : "status-dot offline";
        } catch {
          d.className = "status-dot offline";
        }
      }

      document.getElementById("apiUrl").addEventListener("change", () => {
        checkHealth();
        loadCurrentPage();
      });

      async function api(path, opts = {}) {
        const r = await fetch(B() + path, opts);
        const j = await r.json();
        if (!j.success) throw new Error(j.error || "Request failed");
        return j.data;
      }

      let currentPage = "runners";
      function showPage(name) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("page-" + name).classList.add("active");
        document.querySelectorAll(".nav-btn").forEach((b) => {
          if (b.textContent.trim().toLowerCase().startsWith(name.slice(0, 4)))
            b.classList.add("active");
        });
        currentPage = name;
        loadCurrentPage();
      }
      function loadCurrentPage() {
        ({
          runners: loadRunners,
          runs: loadRuns,
          routes: loadRoutes,
          shoes: loadShoes,
          goals: loadGoals,
        })[currentPage]?.();
      }

      function loading(id) {
        document.getElementById(id).innerHTML =
          `<div class="empty"><span class="spinner"></span>Loading...</div>`;
      }
      function msg(id, text, type = "error") {
        const el = document.getElementById(id);
        el.innerHTML = `<div class="${type === "ok" ? "success-msg" : "error-msg"}">${text}</div>`;
        if (type === "ok") setTimeout(() => (el.innerHTML = ""), 3500);
      }
      function clearMsg(id) {
        document.getElementById(id).innerHTML = "";
      }
      const fmtDate = (s) =>
        s
          ? new Date(s).toLocaleDateString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
            })
          : "—";
      const fmtN = (n, d = 1) => (n == null ? "—" : parseFloat(n).toFixed(d));

      function switchTab(page, tab, btn) {
        document
          .querySelectorAll(`#page-${page} .sub-tab`)
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const filterEl = document.getElementById(`${page}-filter`);
        if (filterEl)
          filterEl.style.display = tab === "byRunner" ? "flex" : "none";
        if (tab === "all") ({ runs: loadRuns, goals: loadGoals })[page]?.();
      }

      // ── MODAL ─────────────────────────────────────────────────
      function openModal(type, data) {
        document.getElementById(`${type}-form-msg`).innerHTML = "";
        if (data) {
          fillForm(type, data);
          document.getElementById(`${type}-modal-title`).textContent = {
            runner: `EDIT RUNNER #${data.runner_id}`,
            run: `EDIT RUN #${data.run_id}`,
            route: `EDIT ROUTE #${data.route_id}`,
            shoe: `EDIT SHOE #${data.shoe_id}`,
            goal: `EDIT GOAL #${data.goal_id}`,
          }[type];
        } else {
          clearForm(type);
          document.getElementById(`${type}-modal-title`).textContent = {
            runner: "ADD RUNNER",
            run: "LOG RUN",
            route: "ADD ROUTE",
            shoe: "ADD SHOE",
            goal: "ADD GOAL",
          }[type];
        }
        document.getElementById("modal-" + type).classList.add("open");
      }
      function closeModal(type) {
        document.getElementById("modal-" + type).classList.remove("open");
      }
      function fmsg(type, text, isErr = true) {
        document.getElementById(`${type}-form-msg`).innerHTML =
          `<div class="form-msg ${isErr ? "err" : "ok"}">${text}</div>`;
      }

      document.querySelectorAll(".modal-overlay").forEach((o) =>
        o.addEventListener("click", (e) => {
          if (e.target === o) o.classList.remove("open");
        }),
      );

      function clearForm(type) {
        const fields = {
          runner: [
            "runner-edit-id",
            "rf-first",
            "rf-last",
            "rf-email",
            "rf-dob",
            "rf-weight",
            "rf-height",
          ],
          run: [
            "run-edit-id",
            "runf-runner",
            "runf-dist",
            "runf-dur",
            "runf-hr",
            "runf-cal",
            "runf-weather",
            "runf-temp",
            "runf-route",
            "runf-shoe",
            "runf-notes",
          ],
          route: [
            "route-edit-id",
            "routef-runner",
            "routef-name",
            "routef-dist",
            "routef-elev",
            "routef-loc",
            "routef-desc",
          ],
          shoe: [
            "shoe-edit-id",
            "shoef-runner",
            "shoef-brand",
            "shoef-model",
            "shoef-miles",
            "shoef-notes",
          ],
          goal: [
            "goal-edit-id",
            "goalf-runner",
            "goalf-target",
            "goalf-current",
            "goalf-date",
            "goalf-desc",
          ],
        };
        fields[type]?.forEach((id) => {
          const e = document.getElementById(id);
          if (e) e.value = "";
        });
        const selects = {
          runner: "rf-gender",
          run: "runf-type",
          route: "routef-surface",
          shoe: "shoef-retired",
          goal: "goalf-status",
        };
        const sel = document.getElementById(selects[type]);
        if (sel) sel.selectedIndex = 0;
        if (type === "run")
          document.getElementById("runf-date").value = new Date()
            .toISOString()
            .split("T")[0];
        if (type === "shoe")
          document.getElementById("shoef-retired").value = "false";
        if (type === "goal")
          document.getElementById("goalf-status").value = "active";
      }

      function fillForm(type, d) {
        const s = (id, val) => {
          const e = document.getElementById(id);
          if (e && val != null) e.value = val;
        };
        const datePart = (v) => (v ? v.split("T")[0] : "");
        if (type === "runner") {
          s("runner-edit-id", d.runner_id);
          s("rf-first", d.first_name);
          s("rf-last", d.last_name);
          s("rf-email", d.email);
          s("rf-dob", datePart(d.date_of_birth));
          s("rf-gender", d.gender);
          s("rf-weight", d.weight_lbs);
          s("rf-height", d.height_inches);
        } else if (type === "run") {
          s("run-edit-id", d.run_id);
          s("runf-runner", d.runner_id);
          s("runf-date", datePart(d.run_date));
          s("runf-dist", d.distance_miles);
          s("runf-dur", d.duration_minutes);
          s("runf-type", d.run_type);
          s("runf-hr", d.average_heart_rate);
          s("runf-cal", d.calories_burned);
          s("runf-weather", d.weather);
          s("runf-temp", d.temperature_f);
          s("runf-route", d.route_id);
          s("runf-shoe", d.shoe_id);
          s("runf-notes", d.notes);
        } else if (type === "route") {
          s("route-edit-id", d.route_id);
          s("routef-runner", d.runner_id);
          s("routef-name", d.route_name);
          s("routef-dist", d.distance_miles);
          s("routef-elev", d.elevation_gain_ft);
          s("routef-surface", (d.surface_type || "").toLowerCase());
          s("routef-loc", d.start_location);
          s("routef-desc", d.description);
        } else if (type === "shoe") {
          s("shoe-edit-id", d.shoe_id);
          s("shoef-runner", d.runner_id);
          s("shoef-brand", d.brand);
          s("shoef-model", d.model);
          s("shoef-date", datePart(d.purchase_date));
          s("shoef-miles", d.total_miles);
          s("shoef-retired", d.retired ? "true" : "false");
          s("shoef-notes", d.notes);
        } else if (type === "goal") {
          s("goal-edit-id", d.goal_id);
          s("goalf-runner", d.runner_id);
          s("goalf-type", (d.goal_type || "").toLowerCase());
          s("goalf-target", d.target_value);
          s("goalf-current", d.current_value);
          s("goalf-date", datePart(d.target_date));
          s("goalf-status", d.status);
          s("goalf-desc", d.description);
        }
      }

      // ── RUNNERS ───────────────────────────────────────────────
      async function loadRunners() {
        loading("runners-table");
        clearMsg("runners-msg");
        try {
          const data = await api("/runners");
          document.getElementById("runners-meta").textContent =
            `${data.length} records`;
          document.getElementById("runners-stats").innerHTML = `
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${data.length}</div></div>
      <div class="stat-card"><div class="stat-label">Male</div><div class="stat-value">${data.filter((r) => r.gender === "M").length}</div></div>
      <div class="stat-card"><div class="stat-label">Female</div><div class="stat-value">${data.filter((r) => r.gender === "F").length}</div></div>`;
          if (!data.length) {
            document.getElementById("runners-table").innerHTML =
              '<div class="empty">No runners found.</div>';
            return;
          }
          document.getElementById("runners-table").innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Gender</th><th>DOB</th><th>Weight</th><th>Height</th><th>Actions</th></tr></thead>
        <tbody>${data
          .map(
            (r) => `
          <tr>
            <td class="td-id">#${r.runner_id}</td>
            <td><strong>${r.first_name} ${r.last_name}</strong></td>
            <td style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted)">${r.email}</td>
            <td><span class="badge ${r.gender === "M" ? "badge-green" : r.gender === "F" ? "badge-orange" : "badge-gray"}">${r.gender || "?"}</span></td>
            <td>${fmtDate(r.date_of_birth)}</td>
            <td>${r.weight_lbs ? fmtN(r.weight_lbs, 1) + " lbs" : "—"}</td>
            <td>${r.height_inches ? r.height_inches + '"' : "—"}</td>
            <td><div class="td-actions">
              <button class="btn btn-outline btn-sm" onclick='openModal("runner",${JSON.stringify(r)})'>Edit</button>
            </div></td>
          </tr>`,
          )
          .join("")}
        </tbody>
      </table></div>`;
        } catch (e) {
          msg("runners-msg", e.message);
          document.getElementById("runners-table").innerHTML = "";
        }
      }

      async function submitRunner() {
        const editId = document.getElementById("runner-edit-id").value;
        const body = {
          first_name: document.getElementById("rf-first").value.trim(),
          last_name: document.getElementById("rf-last").value.trim(),
          email: document.getElementById("rf-email").value.trim(),
          date_of_birth: document.getElementById("rf-dob").value || null,
          gender: document.getElementById("rf-gender").value || null,
          weight_lbs:
            parseFloat(document.getElementById("rf-weight").value) || null,
          height_inches:
            parseInt(document.getElementById("rf-height").value) || null,
        };
        if (!body.first_name || !body.last_name || !body.email) {
          fmsg("runner", "First name, last name, and email are required.");
          return;
        }
        try {
          if (editId) {
            await api(`/runners/${editId}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            fmsg("runner", `Runner #${editId} updated!`, false);
          } else {
            const d = await api("/runners", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            fmsg("runner", `Runner created — ID #${d.runner_id}`, false);
          }
          setTimeout(() => {
            closeModal("runner");
            loadRunners();
          }, 1200);
        } catch (e) {
          fmsg("runner", e.message);
        }
      }

      // ── RUNS ──────────────────────────────────────────────────
      async function loadRuns() {
        loading("runs-table");
        clearMsg("runs-msg");
        try {
          renderRuns(await api("/runs"));
        } catch (e) {
          msg("runs-msg", e.message);
          document.getElementById("runs-table").innerHTML = "";
        }
      }
      async function loadRunsByRunner() {
        const id = document.getElementById("runs-runner-id").value.trim();
        if (!id) return loadRuns();
        loading("runs-table");
        clearMsg("runs-msg");
        try {
          renderRuns(await api("/runs?runner_id=" + id), `Runner #${id}`);
        } catch (e) {
          msg("runs-msg", e.message);
          document.getElementById("runs-table").innerHTML = "";
        }
      }
      function renderRuns(data, sub = "") {
        document.getElementById("runs-meta").textContent = sub
          ? `${data.length} records — ${sub}`
          : `${data.length} records`;
        const tm = data.reduce(
          (s, r) => s + (parseFloat(r.distance_miles) || 0),
          0,
        );
        const td = data.reduce(
          (s, r) => s + (parseInt(r.duration_minutes) || 0),
          0,
        );
        document.getElementById("runs-stats").innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Runs</div><div class="stat-value">${data.length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Miles</div><div class="stat-value">${fmtN(tm, 1)}</div></div>
    <div class="stat-card"><div class="stat-label">Total Hours</div><div class="stat-value">${fmtN(td / 60, 1)}</div></div>`;
        if (!data.length) {
          document.getElementById("runs-table").innerHTML =
            '<div class="empty">No runs found.</div>';
          return;
        }
        const tc = (t) =>
          ({
            Long: "badge-green",
            Easy: "badge-gray",
            Tempo: "badge-orange",
            Interval: "badge-orange",
            Race: "badge-red",
            Recovery: "badge-gray",
          })[t] || "badge-gray";
        document.getElementById("runs-table").innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>Runner</th><th>Date</th><th>Distance</th><th>Duration</th><th>Pace</th><th>Type</th><th>Actions</th></tr></thead>
      <tbody>${data
        .map(
          (r) => `
        <tr>
          <td class="td-id">#${r.run_id}</td>
          <td class="td-id">Runner #${r.runner_id}</td>
          <td>${fmtDate(r.run_date)}</td>
          <td><strong>${fmtN(r.distance_miles, 2)} mi</strong></td>
          <td>${r.duration_minutes} min</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.75rem">${r.pace_min_per_mile ? fmtN(r.pace_min_per_mile, 2) + "/mi" : "—"}</td>
          <td><span class="badge ${tc(r.run_type)}">${r.run_type || "—"}</span></td>
          <td><div class="td-actions">

              '<div class="empty">No routes found.</div>';
            return;
          }
          const sc = (s) =>
            ({
              road: "badge-green",
              trail: "badge-orange",
              track: "badge-gray",
              mixed: "badge-orange",
              treadmill: "badge-gray",
            })[(s || "").toLowerCase()] || "badge-gray";
          document.getElementById("routes-table").innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Name</th><th>Distance</th><th>Elevation</th><th>Surface</th><th>Start Location</th><th>Runner</th><th>Actions</th></tr></thead>

          .map(
            (r) => `

            <td class="td-id">#${r.route_id}</td>
            <td><strong>${r.route_name}</strong></td>
            <td>${fmtN(r.distance_miles, 2)} mi</td>
            <td>${r.elevation_gain_ft != null ? r.elevation_gain_ft + " ft" : "—"}</td>
            <td><span class="badge ${sc(r.surface_type)}">${r.surface_type || "—"}</span></td>

        </tbody>
      </table></div>`;

      // ── GOALS ─────────────────────────────────────────────────
      async function loadGoals() {
        loading("goals-table");
        clearMsg("goals-msg");
        try {
          renderGoals(await api("/goals"));
        } catch (e) {
          msg("goals-msg", e.message);
          document.getElementById("goals-table").innerHTML = "";
        }
      }
      async function loadGoalsByRunner() {
        const id = document.getElementById("goals-runner-id").value.trim();
        if (!id) return loadGoals();
        loading("goals-table");
        clearMsg("goals-msg");
        try {
          renderGoals(await api("/goals?runner_id=" + id), `Runner #${id}`);
        } catch (e) {
          msg("goals-msg", e.message);
          document.getElementById("goals-table").innerHTML = "";
        }
      }
      function renderGoals(data, sub = "") {
        document.getElementById("goals-meta").textContent = sub
          ? `${data.length} records — ${sub}`
          : `${data.length} records`;
        document.getElementById("goals-stats").innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${data.length}</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value">${data.filter((g) => g.status === "active").length}</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">${data.filter((g) => g.status === "completed").length}</div></div>`;
        if (!data.length) {
          document.getElementById("goals-table").innerHTML =
            '<div class="empty">No goals found.</div>';
          return;
        }
        const sb = (s) =>
          ({
            active: "badge-green",
            completed: "badge-orange",
            failed: "badge-red",
          })[s] || "badge-gray";
        document.getElementById("goals-table").innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>Runner</th><th>Type</th><th>Target</th><th>Current</th><th>Progress</th><th>Target Date</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${data
        .map((g) => {
          const pct = g.target_value
            ? Math.min(
                100,
                Math.round((g.current_value / g.target_value) * 100),
              )
            : 0;
          return `<tr>
          <td class="td-id">#${g.goal_id}</td>
          <td class="td-id">Runner #${g.runner_id}</td>
          <td>${g.goal_type || "—"}</td>
          <td>${fmtN(g.target_value, 1)}</td>
          <td>${fmtN(g.current_value, 1)}</td>
          <td><div style="display:flex;align-items:center;gap:0.5rem">
            <div style="flex:1;background:var(--border);border-radius:2px;height:4px;min-width:60px">
              <div style="width:${pct}%;background:var(--accent);height:4px;border-radius:2px"></div>
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">${pct}%</span>
          </div></td>
          <td style="font-size:0.78rem">${fmtDate(g.target_date)}</td>
          <td><span class="badge ${sb(g.status)}">${g.status || "—"}</span></td>
          <td><div class="td-actions">
            <button class="btn btn-outline btn-sm" onclick='openModal("goal",${JSON.stringify(g)})'>Edit</button>
          </div></td>
        </tr>`;
        })
        .join("")}
      </tbody>
    </table></div>`;
      }
